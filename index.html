<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: активирует env(safe-area-inset-*) под чёлкой/жест-баром (19-ui-ux §4.4
         «Safe-area»). user-scalable=no отключает браузерный page-pinch (нежелателен для игры на
         канвасе) — камерный pinch-zoom обрабатывается отдельно на уровне канваса (OrbitControls
         сам включает touch-action:none на своём domElement), поэтому не конфликтует. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#e2523b" />
    <title>Sunnyside</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
